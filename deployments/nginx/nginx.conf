events {
    worker_connections 1024;
}

http {
    # Sets the bounding box
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=10r/s;
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / { # forwarding all endpoints to nginx
            # Docker's internal DNS IP
            resolver 127.0.0.11 valid=30s;

            # Applies the limitation to the endpoint
            limit_req zone=apilimit burst=5 nodelay;

            set $backend_service http://api:8000;
            proxy_pass $backend_service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host:8080$request_uri;
    }

}