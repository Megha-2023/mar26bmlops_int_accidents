name: Accident Prediction CI/CD

# Trigger the workflow on push to main or pull requests

on:
  pull_request:
  push:
    branches: [ "master" , "feature/airflow_grafana_ci"]
  
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Install Docker Compose (new plugin style)
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      # 4. Build all services
      - name: Build Docker Compose stack
        run: |
          docker compose build

      # 5. Start services in background
      - name: Start services
        run: |
          docker compose up -d

      # 6. Wait for services to stabilize
      - name: Wait for services
        run: |
          echo "Waiting for services..."
          sleep 30

      # 7. Check running containers
      - name: Docker ps
        run: docker ps

      # RUN pytest if tests are outside containers:
      - name: Run pytest locally
        run: pip install -r requirements.txt && pytest

      # 9. Tear down stack
      - name: Shutdown services
        if: always()
        run: |
          docker compose down -v