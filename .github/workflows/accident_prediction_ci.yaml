name: New_Accident Prediction Pipeline

# Trigger the workflow on push to main or pull requests

on:
  pull_request:
  push:
    branches: [ "master" , "feature/airflow_grafana_ci"]
  
permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

  docker-build:
    name: Docker build Validattion
    runs-on: ubuntu-latest
  
    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # 3. Install Docker Compose
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          docker compose version

      # 4. Build all services
      - name: Build Docker Compose stack
        run: |
          docker compose build

      # 5. Start services in background
      - name: Start services
        run: |
          docker compose up -d

      # 6. Wait for services to stabilize
      - name: Wait for services
        run: |
          echo "Waiting for services..."
          sleep 30

      # 7. Check running containers
      - name: Docker ps
        run: docker ps

      # RUN pytest if tests are outside containers:
      - name: Run pytest locally
        run: pip install -r requirements.txt && pytest

      # 9. Tear down stack
      - name: Shutdown services
        if: always()
        run: |
          docker compose down -v