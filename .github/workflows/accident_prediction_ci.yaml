name: New_Accident Prediction Pipeline

# Trigger the workflow on push to main or pull requests

on:
  pull_request:
  push:
    branches: [ "master" , "feature/airflow_grafana_ci"]
  
permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  evaluate-model:
    name: Model Evaluation
    runs-on: ubuntu-latest
  
    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Show workspace
      - name: Show workspace
        run: |
          pwd
          ls -R

      # Install dependencies
      - name: Install d dencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest

      # Run evaluation script
      - name: Run model evaluation
        run: |
          python src/models/evaluate_model.py

      # Upload metrics as artifact
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-metrics
          path: |
            metrics/
  
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: evaluate-model
  
    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Show workspace
      - name: Show workspace
        run: |
          pwd
          ls -R

      # Install dependencies
      - name: Install d dencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest
      
      # Run tests
      - name: Run tests
        run: pytest -q       
