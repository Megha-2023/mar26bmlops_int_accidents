x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: accident-airflow:latest
  environment:
    AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "nHCPj9XNchnGV6f2JPC3WcSO7eKMsAmLe0p88CLpDp4="
    AIRFLOW__WEBSERVER__SECRET_KEY: "7ae162eddb6167a9e537b5d01f34395b6c3810a5ca7ecaa7667faa2e0de8eccf"
    AIRFLOW__CORE__PARALLELISM: 1
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: 1
    MLFLOW_TRACKING_URI: http://mlflow:5000
    MLFLOW_ARTIFACT_ROOT: http://mlflow:5000
    PYTHONPATH: /opt/airflow
  volumes:
    - ./src:/opt/airflow/src
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ------ MLflow ----------
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --artifacts-destination /mlruns
      --serve-artifacts
      --allowed-hosts '*'

  # -------- BASE IMAGE BUILDER (build once) --------
  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: ml-base:latest

  # ----------- ML Container --------
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile.ml
    image: mlpipeline:latest
    container_name: ml_train
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - ./metrics:/app/metrics
      - ./params.json:/app/params.json
      - ./mlruns:/app/mlruns
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: >
      bash -c "python src/models/train_model.py &&
              python src/track_experiment.py"
    depends_on:
      - base
      - mlflow

  # ------ Airflow Postgres -------
  postgres:
    image: postgres:13
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    profiles:
      - airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  # ------ Airflow Init -------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
          airflow users create --username admin --password pass123 --firstname TestAdmin --lastname user --role Admin --email admin@example.com || true"
    profiles:
      - airflow
    volumes:
    - ./src:/opt/airflow/src
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    restart: "no"

  # ------ Airflow WebServer -----
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: airflow webserver --port 8081
    ports:
      - "8081:8081"
    profiles:
      - airflow
    volumes:
      - ./src:/opt/airflow/src
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    depends_on:
      - postgres  

  # ------- Airflow Scheduler ------ 
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: airflow scheduler
    profiles:
      - airflow
    volumes:
      - ./src:/opt/airflow/src
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    depends_on:
      - postgres

  # -------- API -----------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: accident-api:latest
    container_name: api
    working_dir: /app
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_URI=models:/accident_prediction@challenger
    volumes:
      - ./models:/app/models
    depends_on:
      base:
        condition: service_completed_successfully
      ml-service:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
  
  # ----- NGINX -------
  nginx:
    build:
      context: deployments/nginx/
      dockerfile: Dockerfile
    image: accident-nginx:latest
    container_name: nginx_revproxy
    ports:
      - "8080:443"
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

  # ----------- ML Container --------
  drift-monitoring:
    build:
      context: .
      dockerfile: Dockerfile.ml
    container_name: drift_monitor
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - ./metrics:/app/metrics
      - ./params.json:/app/params.json
      - ./mlruns:/app/mlruns
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app 
    command: >
      bash -c "python src/monitoring/run_evidently_local.py"
    depends_on:
      ml-service:
        condition: service_completed_successfully

volumes:
  ml-service_data:
  mlflow_data:
  postgres_data:

 