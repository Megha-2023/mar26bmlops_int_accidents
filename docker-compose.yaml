services:
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --backend-store-uri /mlruns
      --default-artifact-root /mlruns
      --serve-artifacts
  
  dvc:
    build: .
    container_name: dvc
    working_dir: /app
    command: dvc repro
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow

volumes:
  mlflow_data:

 
